# Frontend Service NodePort 30080 — e.g. http://47.103.133.105:30080/
# On deploy host: keep this file as /opt/k8s/frontend.yaml (pipeline applies from K8S_DIR).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-frontend
  namespace: warehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warehouse-frontend
  template:
    metadata:
      labels:
        app: warehouse-frontend
    spec:
      containers:
        - name: frontend
          image: warehouse-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: warehouse-frontend
  namespace: warehouse
spec:
  selector:
    app: warehouse-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort

