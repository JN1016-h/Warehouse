# Deploy to Alibaba Cloud ECS after CI passes (GitHub runner SSH → ECS).
#
# On ECS (first time): install git, docker, kubectl; create DEPLOY_PATH and git clone this repo, e.g.
#   sudo mkdir -p /opt/deploy && sudo git clone https://github.com/<owner>/<repo>.git /opt/deploy/warehouse-management-project
#   (private repo: use a PAT or deploy key in the clone URL / ~/.git-credentials). Optional: copy k8s to /opt/k8s and set K8S_DIR.
# Security group: SSH (22) must be reachable from the runner. GitHub-hosted runners use changing IPs —
# if SSH fails quickly, allow temporary 0.0.0.0/0:22 for testing, use a bastion, or a self-hosted runner on ECS.
#
# Repo → Settings → Secrets and variables → Actions → Secrets:
#   ALIYUN_HOST     — ECS IP / domain
#   ALIYUN_USER     — SSH user
#   ALIYUN_SSH_KEY  — The PRIVATE key (never .pub, never authorized_keys). Usually the file you generated WITHOUT .pub:
#                     e.g. id_ed25519 or id_rsa on your PC; or on ECS e.g. ~/.ssh/id_ed25519 (same pair whose .pub you put in authorized_keys).
#                     Paste full text including -----BEGIN … PRIVATE KEY----- and -----END …----- lines.
#                     Optional secret ALIYUN_SSH_KEY_PASSPHRASE if that private key is encrypted.
# Variables (optional):
#   ALIYUN_DEPLOY_PATH — clone path on server (default /opt/deploy/warehouse-management-project)
#   K8S_DIR            — manifests dir (default <DEPLOY_PATH>/k8s from repo); use /opt/k8s if you keep copies only on server
#   K8S_NAMESPACE      — default warehouse
#   ALIYUN_SSH_PORT    — default 22
#
# Self-hosted runner (alternative): install runner on ECS, then use runs-on: [self-hosted] in a job.
name: Deploy Aliyun

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Cicd]
    types: [completed]
    branches: [master]

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-aliyun-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy_aliyun_ssh
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    steps:
      # Multiline repo secrets are safer via env → file than passing raw `key:` (avoids ParsePrivateKey / empty key).
      - name: Write SSH private key
        run: |
          f="$GITHUB_WORKSPACE/.ssh_deploy_key"
          umask 077
          echo "$SSH_PRIVATE_KEY" > "$f"
          bytes=$(wc -c < "$f" | tr -d ' ')
          if [ "${bytes:-0}" -lt 80 ]; then
            echo "::error::ALIYUN_SSH_KEY is empty or too short."
            exit 1
          fi
          if ! grep -qE 'BEGIN (OPENSSH|RSA|EC) PRIVATE KEY' "$f"; then
            echo "::error::ALIYUN_SSH_KEY must be a PRIVATE key PEM (contains BEGIN … PRIVATE KEY). Do not use .pub or authorized_keys."
            exit 1
          fi
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Deploy via SSH (docker build + kubectl)
        uses: appleboy/ssh-action@v1.2.1
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          DEPLOY_PATH: ${{ vars.ALIYUN_DEPLOY_PATH }}
          K8S_DIR: ${{ vars.K8S_DIR }}
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          REPO_GIT_URL: ${{ github.server_url }}/${{ github.repository }}.git
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key_path: ${{ github.workspace }}/.ssh_deploy_key
          passphrase: ${{ secrets.ALIYUN_SSH_KEY_PASSPHRASE }}
          port: ${{ vars.ALIYUN_SSH_PORT || 22 }}
          envs: GITHUB_RUN_NUMBER,GITHUB_SHA,DEPLOY_PATH,K8S_DIR,NAMESPACE,REPO_GIT_URL
          script: |
            set -euo pipefail
            DP="${DEPLOY_PATH:-/opt/deploy/warehouse-management-project}"
            KD="${K8S_DIR:-${DP}/k8s}"
            NS="${NAMESPACE:-warehouse}"
            echo "== path=${DP} k8s=${KD} ns=${NS}"
            if [ ! -d "$DP" ]; then
              echo "ERROR: deploy directory missing: ${DP}"
              echo "On ECS (once): sudo mkdir -p \"$(dirname "$DP")\" && sudo git clone \"${REPO_GIT_URL}\" \"$DP\""
              echo "If the repo is private, clone on the server with a PAT/deploy key, or set Variable ALIYUN_DEPLOY_PATH to an existing clone path."
              exit 1
            fi
            if [ ! -e "$DP/.git" ]; then
              echo "ERROR: not a git repo: ${DP}"
              exit 1
            fi
            if ! command -v docker >/dev/null 2>&1; then echo "ERROR: docker not in PATH"; exit 1; fi
            if ! command -v kubectl >/dev/null 2>&1; then echo "ERROR: kubectl not in PATH"; exit 1; fi
            cd "$DP"
            git fetch origin
            git checkout master
            git reset --hard origin/master
            IMAGE="warehouse-app:build.${GITHUB_RUN_NUMBER}"
            FE_IMAGE="warehouse-frontend:build.${GITHUB_RUN_NUMBER}"
            docker build -t "${IMAGE}" -f ./Dockerfile .
            kubectl apply -f "${KD}/namespace.yaml"
            kubectl apply -f "${KD}/app.yaml"
            kubectl set image "deployment/warehouse-app" "app=${IMAGE}" -n "${NS}" --record
            kubectl rollout status "deployment/warehouse-app" -n "${NS}" --timeout=300s || true
            docker build -f deploy/frontend-ci.Dockerfile -t "${FE_IMAGE}" .
            kubectl apply -f "${KD}/frontend.yaml"
            kubectl set image "deployment/warehouse-frontend" "frontend=${FE_IMAGE}" -n "${NS}" --record
            kubectl rollout status "deployment/warehouse-frontend" -n "${NS}" --timeout=300s || true
            echo "== done ${GITHUB_SHA}"

      - name: Remove deploy SSH key file
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/.ssh_deploy_key"
