# Deploy to Alibaba Cloud ECS after CI passes (GitHub runner SSH -> ECS).
#
# On ECS (first time): install git, docker, kubectl; create DEPLOY_PATH and git clone this repo.
#   HTTPS: sudo mkdir -p /opt/deploy && sudo git clone https://github.com/<owner>/<repo>.git /opt/deploy/warehouse-management-project
#   SSH: add Deploy key from *.pub on GitHub repo, then clone with GIT_SSH_COMMAND (see error hint in workflow) or set Variable ALIYUN_GIT_SSH_IDENTITY_FILE for deploy-time git fetch.
#   Private repo: PAT in HTTPS URL, or Deploy key + ALIYUN_GIT_SSH_IDENTITY_FILE.
# Security group: SSH (22) must be reachable from the runner (GitHub-hosted IPs change; use bastion/self-hosted runner if needed).
#
# Repo -> Settings -> Secrets and variables -> Actions -> Secrets:
#   ALIYUN_HOST, ALIYUN_USER, ALIYUN_SSH_KEY (full PRIVATE key PEM; not .pub; optional ALIYUN_SSH_KEY_PASSPHRASE)
# Variables (optional):
#   ALIYUN_DEPLOY_PATH, K8S_DIR, K8S_NAMESPACE, ALIYUN_SSH_PORT
#   ALIYUN_GIT_SSH_IDENTITY_FILE — REQUIRED on ECS if git remote origin is SSH (git@github.com:...).
#     Path to the Deploy key private key readable by ALIYUN_USER (e.g. /root/.ssh/github_repo_clone). Sets GIT_SSH_COMMAND for git fetch.
#     If origin is HTTPS, this variable is optional.

name: Deploy Aliyun

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Cicd]
    types: [completed]
    branches: [master]

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-aliyun-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy_aliyun_ssh
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    steps:
      # Multiline repo secrets are safer via env → file than passing raw `key:` (avoids ParsePrivateKey / empty key).
      - name: Write SSH private key
        run: |
          f="$GITHUB_WORKSPACE/.ssh_deploy_key"
          umask 077
          echo "$SSH_PRIVATE_KEY" > "$f"
          bytes=$(wc -c < "$f" | tr -d ' ')
          if [ "${bytes:-0}" -lt 80 ]; then
            echo "::error::ALIYUN_SSH_KEY is empty or too short."
            exit 1
          fi
          if ! grep -qE 'BEGIN (OPENSSH|RSA|EC) PRIVATE KEY' "$f"; then
            echo "::error::ALIYUN_SSH_KEY must be a PRIVATE key PEM (contains BEGIN … PRIVATE KEY). Do not use .pub or authorized_keys."
            exit 1
          fi
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Deploy via SSH (docker build + kubectl)
        uses: appleboy/ssh-action@v1.2.1
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          DEPLOY_PATH: ${{ vars.ALIYUN_DEPLOY_PATH }}
          K8S_DIR: ${{ vars.K8S_DIR }}
          NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          REPO_GIT_URL: ${{ github.server_url }}/${{ github.repository }}.git
          REPO_SSH_GIT_URL: git@github.com:${{ github.repository }}.git
          GIT_SSH_IDENTITY_FILE: ${{ vars.ALIYUN_GIT_SSH_IDENTITY_FILE }}
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key_path: ${{ github.workspace }}/.ssh_deploy_key
          passphrase: ${{ secrets.ALIYUN_SSH_KEY_PASSPHRASE }}
          port: ${{ vars.ALIYUN_SSH_PORT || 22 }}
          envs: GITHUB_RUN_NUMBER,GITHUB_SHA,DEPLOY_PATH,K8S_DIR,NAMESPACE,REPO_GIT_URL,REPO_SSH_GIT_URL,GIT_SSH_IDENTITY_FILE
          script: |
            set -euo pipefail
            DP="${DEPLOY_PATH:-/opt/deploy/warehouse-management-project}"
            KD="${K8S_DIR:-${DP}/k8s}"
            NS="${NAMESPACE:-warehouse}"
            echo "== path=${DP} k8s=${KD} ns=${NS}"
            if [ ! -d "$DP" ]; then
              echo "ERROR: deploy directory missing: ${DP}"
              echo "On ECS (once), HTTPS: sudo mkdir -p \"$(dirname "$DP")\" && sudo git clone \"${REPO_GIT_URL}\" \"$DP\""
              echo "Or SSH (add Deploy key from *.pub first), set Variable ALIYUN_GIT_SSH_IDENTITY_FILE on GitHub, then:"
              echo "  sudo mkdir -p \"$(dirname "$DP")\" && sudo GIT_SSH_COMMAND=\"ssh -i /path/to/key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new\" git clone \"${REPO_SSH_GIT_URL}\" \"$DP\""
              echo "Private repo: PAT in HTTPS URL, or Deploy key + ALIYUN_GIT_SSH_IDENTITY_FILE. Or set ALIYUN_DEPLOY_PATH to an existing clone."
              exit 1
            fi
            if [ ! -e "$DP/.git" ]; then
              echo "ERROR: not a git repo: ${DP}"
              exit 1
            fi
            if ! command -v docker >/dev/null 2>&1; then echo "ERROR: docker not in PATH"; exit 1; fi
            if ! command -v kubectl >/dev/null 2>&1; then echo "ERROR: kubectl not in PATH"; exit 1; fi
            cd "$DP"
            ORIGIN_URL="$(git remote get-url origin 2>/dev/null || true)"
            echo "== git origin: ${ORIGIN_URL}"
            if echo "${ORIGIN_URL}" | grep -q '^git@'; then
              if [ -z "${GIT_SSH_IDENTITY_FILE:-}" ] || [ ! -r "${GIT_SSH_IDENTITY_FILE}" ]; then
                echo "::error::origin is SSH (${ORIGIN_URL}) but ALIYUN_GIT_SSH_IDENTITY_FILE is unset or not readable by this user."
                echo "::error::GitHub repo -> Settings -> Variables -> ALIYUN_GIT_SSH_IDENTITY_FILE = /root/.ssh/github_repo_clone (or your key path; must be readable by ALIYUN_USER)."
                echo "::error::Or on ECS once: git remote set-url origin \"${REPO_GIT_URL}\" and use HTTPS + PAT/credential helper."
                exit 1
              fi
              export GIT_SSH_COMMAND="ssh -i ${GIT_SSH_IDENTITY_FILE} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
              echo "== git->GitHub via GIT_SSH_COMMAND (${GIT_SSH_IDENTITY_FILE})"
            fi
            git fetch origin
            git checkout master
            git reset --hard origin/master
            IMAGE="warehouse-app:build.${GITHUB_RUN_NUMBER}"
            FE_IMAGE="warehouse-frontend:build.${GITHUB_RUN_NUMBER}"
            docker build -t "${IMAGE}" -f ./Dockerfile .
            kubectl apply -f "${KD}/namespace.yaml"
            kubectl apply -f "${KD}/app.yaml"
            kubectl set image "deployment/warehouse-app" "app=${IMAGE}" -n "${NS}" --record
            kubectl rollout status "deployment/warehouse-app" -n "${NS}" --timeout=300s || true
            docker build -f deploy/frontend-ci.Dockerfile -t "${FE_IMAGE}" .
            kubectl apply -f "${KD}/frontend.yaml"
            kubectl set image "deployment/warehouse-frontend" "frontend=${FE_IMAGE}" -n "${NS}" --record
            kubectl rollout status "deployment/warehouse-frontend" -n "${NS}" --timeout=300s || true
            echo "== done ${GITHUB_SHA}"

      - name: Remove deploy SSH key file
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/.ssh_deploy_key"
