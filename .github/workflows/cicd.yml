# Matches GitHub Actions layout: sidebar jobs sast → unit → integration → container_iac_scan → dast → performance,
# with performance steps aligned to the reference diagram (k6 + JMeter + artifacts).
#
# Production (K8s NodePort): defaults frontend http://HOST:30080/ — backend http://HOST:30081/
# Override in Repo → Settings → Secrets and variables → Actions → Variables:
#   PRODUCTION_HOST, PRODUCTION_FRONTEND_NODEPORT, PRODUCTION_BACKEND_NODEPORT
# On the cluster/deploy host, manifests are applied from: /opt/k8s/app.yaml and /opt/k8s/frontend.yaml
# (see repo k8s/*.yaml; Gitee pipeline default K8S_DIR is /opt/k8s).
name: Cicd

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: warehouse-app:ci-${{ github.sha }}
  APP_HEALTH_URL: "http://${{ vars.PRODUCTION_HOST || '47.103.133.105' }}:${{ vars.PRODUCTION_BACKEND_NODEPORT || '30081' }}/springboot38hdw40x/config/list?page=1&limit=1"
  # Local CI stack: app container publishes 8080; MySQL runs as mysql-ci on Docker network (see dast/performance jobs).
  CI_LOCAL_HEALTH_URL: http://127.0.0.1:8080/springboot38hdw40x/config/list?page=1&limit=1
  CI_LOCAL_APP_BASE: http://127.0.0.1:8080/springboot38hdw40x
  CI_MYSQL_IMAGE: mysql:8.0
  PRODUCTION_FRONTEND_URL: "http://${{ vars.PRODUCTION_HOST || '47.103.133.105' }}:${{ vars.PRODUCTION_FRONTEND_NODEPORT || '30080' }}"
  PRODUCTION_BACKEND_URL: "http://${{ vars.PRODUCTION_HOST || '47.103.133.105' }}:${{ vars.PRODUCTION_BACKEND_NODEPORT || '30081' }}"
  K8S_REMOTE_MANIFEST_DIR: /opt/k8s

jobs:
  sast:
    name: sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          python3 -m pip install --user semgrep
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Without --error: findings are reported but do not fail the workflow (strict rulesets often flag legacy code).
      # Restore --error after triaging: semgrep --config p/java --error --timeout 300 .
      - name: Semgrep (Java)
        run: semgrep --config p/java --timeout 300 .

      - name: Semgrep (JavaScript)
        run: semgrep --config p/javascript --timeout 300 .

  unit:
    name: unit
    needs: sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Maven unit tests
        run: mvn -B -ntp test -DskipTests=false -Dmaven.test.skip=false

  integration:
    name: integration
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Integration smoke (placeholder)
        run: |
          echo "No dedicated IT yet; add tests under src/test or a dedicated IT profile when ready."

  container_iac_scan:
    name: container_iac_scan
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker build (local)
        run: docker build -f ./Dockerfile -t "${{ env.IMAGE }}" .

      # Pin a release that still ships Linux-64bit.tar.gz (older tags like v0.53.0 may 404 → wget exit 8).
      - name: Install Trivy
        run: |
          set -euo pipefail
          TRIVY_VERSION=0.70.0
          curl -fsSL -o /tmp/trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          sudo chmod 755 /usr/local/bin/trivy
          trivy --version

      - name: Trivy filesystem scan
        run: trivy fs --scanners vuln,config --exit-code 0 --timeout 10m .

      - name: Trivy image scan
        run: trivy image --exit-code 0 --timeout 15m "${{ env.IMAGE }}"

  dast:
    name: dast
    needs: container_iac_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker build (local)
        run: docker build -f ./Dockerfile -t "${{ env.IMAGE }}" .

      - name: Start MySQL for CI
        run: |
          set -euo pipefail
          docker rm -f mysql-ci 2>/dev/null || true
          docker network rm ci-app-net 2>/dev/null || true
          docker network create ci-app-net
          docker run -d --name mysql-ci --network ci-app-net \
            -e MYSQL_ROOT_PASSWORD=123123 \
            -e MYSQL_DATABASE=springboot38hdw40x \
            -v "$GITHUB_WORKSPACE/db/springboot38hdw40x.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro" \
            "${{ env.CI_MYSQL_IMAGE }}"
          for i in $(seq 1 90); do
            if docker exec mysql-ci mysqladmin ping -h127.0.0.1 -uroot -p123123 --silent 2>/dev/null; then
              echo "mysql ready"
              exit 0
            fi
            sleep 2
          done
          echo "mysql did not become ready in time"
          docker logs mysql-ci --tail 80 || true
          exit 1

      - name: Run app for ZAP
        run: |
          docker rm -f warehouse-app-ci 2>/dev/null || true
          docker run -d --name warehouse-app-ci --network ci-app-net \
            -p 127.0.0.1:8080:8080 \
            -e JAVA_OPTS="-Xms256m -Xmx512m" \
            -e SPRING_DATASOURCE_URL='jdbc:mysql://mysql-ci:3306/springboot38hdw40x?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true' \
            -e SPRING_DATASOURCE_USERNAME=root \
            -e SPRING_DATASOURCE_PASSWORD=123123 \
            "${{ env.IMAGE }}"

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 60); do
            curl -fsS "${{ env.CI_LOCAL_HEALTH_URL }}" && exit 0
            sleep 2
          done
          exit 1

      - name: OWASP ZAP baseline
        run: |
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE:/zap/wrk:rw" \
            owasp/zap2docker-stable \
            zap-baseline.py \
            -t "${{ env.CI_LOCAL_HEALTH_URL }}" \
            -r zap-report.html || true
          ls -lah zap-report.html || true

      - name: Stop CI containers
        if: always()
        run: |
          docker rm -f warehouse-app-ci mysql-ci 2>/dev/null || true
          docker network rm ci-app-net 2>/dev/null || true

  performance:
    name: performance
    needs: dast
    runs-on: ubuntu-latest
    env:
      JMETER_SRC_HOST: ${{ vars.PRODUCTION_HOST || '47.103.133.105' }}
      JMETER_SRC_PORT: ${{ vars.PRODUCTION_BACKEND_NODEPORT || '30081' }}
    steps:
      - name: Set up job
        run: |
          mkdir -p perf-artifacts/jmeter perf-artifacts/k6 tests/jmeter/output
          docker --version

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start MySQL for CI
        run: |
          set -euo pipefail
          docker rm -f mysql-ci 2>/dev/null || true
          docker network rm ci-app-net 2>/dev/null || true
          docker network create ci-app-net
          docker run -d --name mysql-ci --network ci-app-net \
            -e MYSQL_ROOT_PASSWORD=123123 \
            -e MYSQL_DATABASE=springboot38hdw40x \
            -v "$GITHUB_WORKSPACE/db/springboot38hdw40x.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro" \
            "${{ env.CI_MYSQL_IMAGE }}"
          for i in $(seq 1 90); do
            if docker exec mysql-ci mysqladmin ping -h127.0.0.1 -uroot -p123123 --silent 2>/dev/null; then
              echo "mysql ready"
              exit 0
            fi
            sleep 2
          done
          echo "mysql did not become ready in time"
          docker logs mysql-ci --tail 80 || true
          exit 1

      - name: Launch app for perf tests
        run: |
          docker build -f ./Dockerfile -t "${{ env.IMAGE }}" .
          docker rm -f warehouse-app-ci 2>/dev/null || true
          docker run -d --name warehouse-app-ci --network ci-app-net \
            -p 127.0.0.1:8080:8080 \
            -e JAVA_OPTS="-Xms256m -Xmx512m" \
            -e SPRING_DATASOURCE_URL='jdbc:mysql://mysql-ci:3306/springboot38hdw40x?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true' \
            -e SPRING_DATASOURCE_USERNAME=root \
            -e SPRING_DATASOURCE_PASSWORD=123123 \
            "${{ env.IMAGE }}"

      - name: Wait for services to be ready
        run: |
          for i in $(seq 1 60); do
            curl -fsS "${{ env.CI_LOCAL_HEALTH_URL }}" && exit 0
            sleep 2
          done
          exit 1

      - name: Install k6
        run: |
          curl -fsSL -o /tmp/k6.tgz https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz
          sudo tar -C /tmp -xzf /tmp/k6.tgz
          sudo install -m 0755 /tmp/k6-v0.49.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Verify target endpoint before k6 test
        run: curl -fsS "${{ env.CI_LOCAL_APP_BASE }}/config/list?page=1&limit=5"

      - name: k6 load test
        run: |
          mkdir -p perf-artifacts/k6
          k6 run --out json=perf-artifacts/k6/raw.json \
            -e BASE_URL="${{ env.CI_LOCAL_APP_BASE }}" \
            tests/k6/smoke.js

      - name: Generate k6 summary
        run: |
          python3 << 'PY'
          import json
          from pathlib import Path

          def point_value(obj):
              """k6 NDJSON: legacy uses metric_value; newer uses data.value or top-level value."""
              if "metric_value" in obj:
                  try:
                      return float(obj["metric_value"])
                  except (TypeError, ValueError):
                      return None
              if "value" in obj:
                  try:
                      return float(obj["value"])
                  except (TypeError, ValueError):
                      return None
              data = obj.get("data")
              if isinstance(data, dict) and "value" in data:
                  try:
                      return float(data["value"])
                  except (TypeError, ValueError):
                      return None
              return None

          p = Path('perf-artifacts/k6/raw.json')
          lines = []
          for l in p.read_text(encoding='utf-8', errors='ignore').splitlines():
              if not l.strip():
                  continue
              try:
                  lines.append(json.loads(l))
              except json.JSONDecodeError:
                  continue

          samples = []
          failed_n = 0
          for x in lines:
              if x.get("type") != "Point":
                  continue
              m = x.get("metric")
              v = point_value(x)
              if v is None:
                  continue
              if m == "http_req_duration":
                  samples.append(v)
              elif m == "http_req_failed" and v > 0:
                  failed_n += 1

          out = Path('perf-artifacts/k6/summary.txt')
          out.parent.mkdir(parents=True, exist_ok=True)
          if samples:
              s = sorted(samples)
              def pct(q):
                  idx = int(round((len(s) - 1) * q))
                  return s[max(0, min(len(s) - 1, idx))]
              out.write_text(
                  "k6 http_req_duration samples: %d\n" % len(samples)
                  + "avg=%.2f ms\n" % (sum(samples) / len(samples))
                  + "p50=%.2f ms\n" % pct(0.50)
                  + "p95=%.2f ms\n" % pct(0.95)
                  + "max=%.2f ms\n" % max(samples)
                  + "http_req_failed_points=%d\n" % failed_n,
                  encoding='utf-8'
              )
          else:
              out.write_text("No http_req_duration samples parsed from raw.json\n", encoding='utf-8')
          PY

      - name: Install JMeter
        run: |
          JMETER_VER=5.6.3
          curl -fsSL -o /tmp/jmeter.tgz "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VER}.tgz"
          sudo tar -C /opt -xzf /tmp/jmeter.tgz
          echo "JMETER_HOME=/opt/apache-jmeter-${JMETER_VER}" >> "$GITHUB_ENV"
          echo "/opt/apache-jmeter-${JMETER_VER}/bin" >> "$GITHUB_PATH"
          # GITHUB_PATH applies only to subsequent steps; verify with full path here.
          "/opt/apache-jmeter-${JMETER_VER}/bin/jmeter" -v

      - name: Configure JMeter security settings
        run: |
          printf '%s\n' \
            'jmeter.save.saveservice.timestamp_format=yyyy/MM/dd HH:mm:ss' \
            'jmeter.save.saveservice.default_delimiter=,' \
            > /tmp/jmeter-user.properties

      - name: Run JMeter plan
        run: |
          mkdir -p tests/jmeter/output perf-artifacts/jmeter
          cp tests/jmeter/warehouse-load.jmx /tmp/warehouse-load.ci.jmx
          sed -i "s#<stringProp name=\"HTTPSampler.domain\">${JMETER_SRC_HOST}</stringProp>#<stringProp name=\"HTTPSampler.domain\">127.0.0.1</stringProp>#g" /tmp/warehouse-load.ci.jmx
          sed -i "s#<stringProp name=\"HTTPSampler.port\">${JMETER_SRC_PORT}</stringProp>#<stringProp name=\"HTTPSampler.port\">8080</stringProp>#g" /tmp/warehouse-load.ci.jmx
          jmeter -n -t /tmp/warehouse-load.ci.jmx \
            -l tests/jmeter/output/result.jtl \
            -j tests/jmeter/output/jmeter.log \
            -q /tmp/jmeter-user.properties

      - name: Generate JMeter JTL summary
        run: |
          python3 << 'PY'
          import csv
          from pathlib import Path
          from statistics import mean
          jtl = Path('tests/jmeter/output/result.jtl')
          out = Path('perf-artifacts/jmeter/jtl-summary.txt')
          out.parent.mkdir(parents=True, exist_ok=True)
          if not jtl.exists():
              out.write_text('missing result.jtl\n', encoding='utf-8')
              raise SystemExit(0)
          rows = []
          with jtl.open('r', encoding='utf-8', errors='ignore', newline='') as f:
              reader = csv.DictReader(f)
              for r in reader:
                  try:
                      elapsed = float(r.get('elapsed','0'))
                  except Exception:
                      continue
                  rows.append(elapsed)
          if not rows:
              out.write_text('no samples parsed from jtl\n', encoding='utf-8')
          else:
              s = sorted(rows)
              def pct(q):
                  idx = int(round((len(s)-1)*q))
                  return s[max(0, min(len(s)-1, idx))]
              out.write_text(
                  "samples=%d\navg=%.2f ms\np50=%.2f ms\np95=%.2f ms\nmax=%.2f ms\n"
                  % (len(rows), mean(rows), pct(0.50), pct(0.95), max(rows)),
                  encoding='utf-8'
              )
          PY

      - name: List generated files
        run: |
          ls -lah perf-artifacts/k6 || true
          ls -lah perf-artifacts/jmeter || true
          ls -lah tests/jmeter/output || true

      - name: Upload k6 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k6-output
          path: perf-artifacts/k6
          if-no-files-found: warn

      - name: Upload JMeter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-output
          path: |
            perf-artifacts/jmeter
            tests/jmeter/output
          if-no-files-found: warn

      - name: Post Checkout code
        run: echo "Post Checkout code"

      - name: Complete job
        if: always()
        run: |
          docker rm -f warehouse-app-ci mysql-ci 2>/dev/null || true
          docker network rm ci-app-net 2>/dev/null || true

  production_smoke:
    name: production_smoke
    needs: performance
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Echo production targets (K8s NodePort + /opt/k8s manifests)
        run: |
          echo "Frontend: ${{ env.PRODUCTION_FRONTEND_URL }}/"
          echo "Backend:  ${{ env.PRODUCTION_BACKEND_URL }}/springboot38hdw40x/"
          echo "Manifests on server: ${{ env.K8S_REMOTE_MANIFEST_DIR }}/app.yaml, ${{ env.K8S_REMOTE_MANIFEST_DIR }}/frontend.yaml"

      - name: HTTP check production NodePorts (best-effort)
        run: |
          curl -fsS --connect-timeout 8 --max-time 15 \
            "${{ env.APP_HEALTH_URL }}" \
            && echo "backend OK" || echo "backend unreachable from runner (expected if firewall / not deployed)"
          curl -fsS --connect-timeout 8 --max-time 15 \
            -o /dev/null -w "frontend HTTP %{http_code}\n" \
            "${{ env.PRODUCTION_FRONTEND_URL }}/" \
            || echo "frontend unreachable from runner (expected if firewall / not deployed)"
